services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: yuka-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: yuka
      POSTGRES_PASSWORD: yuka_password
      POSTGRES_DB: yuka
    ports:
      - '5434:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U yuka']
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: yuka-minio
    restart: unless-stopped
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/server-py
      dockerfile: Dockerfile
    container_name: yuka-api
    restart: unless-stopped
    env_file:
      - ./apps/server-py/.env
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:3000/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  minio_data:
