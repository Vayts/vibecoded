<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" width="720" height="200">
  <!--
    Acme Combined Logo — Mark + Wordmark (v3 final)
    Vertical flashcards with sparkles + Geist wordmark.
  -->
  <defs>
    <linearGradient id="cc1" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#93C5FD"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="cc2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="cc3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="csg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <filter id="csh" x="-10%" y="-10%" width="130%" height="135%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1E3A5F" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Logo mark (scaled down from 512 to fit ~140px area) -->
  <g transform="translate(80, 15) scale(0.3)">
    <!-- Card 3 -->
    <path opacity="0.7" d="M275.795 117.938L122.319 186.27C114.247 189.864 110.616 199.321 114.21 207.394L215.081 433.953C218.675 442.026 228.133 445.656 236.205 442.062L389.681 373.731C397.754 370.136 401.384 360.679 397.79 352.606L296.919 126.047C293.325 117.974 283.867 114.344 275.795 117.938Z" fill="url(#cc1)" filter="url(#csh)"/>
    <!-- Card 2 -->
    <path opacity="0.85" d="M309.057 113.595L144.728 148.524C136.085 150.362 130.567 158.858 132.404 167.501L183.966 410.082C185.804 418.725 194.3 424.243 202.943 422.406L367.272 387.477C375.916 385.639 381.433 377.143 379.596 368.5L328.034 125.919C326.197 117.276 317.7 111.758 309.057 113.595Z" fill="url(#cc2)" filter="url(#csh)"/>
    <!-- Card 1 (front) -->
    <g filter="url(#csh)">
      <rect x="156" y="116" width="200" height="280" rx="16" fill="url(#cc3)"/>
      <rect x="192" y="166" width="96" height="8" rx="4" fill="white" opacity="0.5"/>
      <rect x="192" y="188" width="69" height="6" rx="3" fill="white" opacity="0.3"/>
      <rect x="192" y="206" width="85" height="6" rx="3" fill="white" opacity="0.3"/>
      <line x1="184" y1="236" x2="328" y2="236" stroke="white" stroke-opacity="0.2" stroke-width="1.5"/>
      <rect x="192" y="256" width="77" height="6" rx="3" fill="white" opacity="0.25"/>
      <rect x="192" y="274" width="53" height="6" rx="3" fill="white" opacity="0.25"/>
    </g>
    <!-- Sparkles -->
    <path d="M370 73C374 93 382 101 402 105C382 109 374 117 370 137C366 117 358 109 338 105C358 101 366 93 370 73Z" fill="url(#csg)"/>
    <path opacity="0.8" d="M400 69C402 76 405 79 412 81C405 83 402 86 400 93C398 86 395 83 388 81C395 79 398 76 400 69Z" fill="#FCD34D"/>
    <path opacity="0.6" d="M350 68C351 72 353 74 357 75C353 76 351 78 350 82C349 78 347 76 343 75C347 74 349 72 350 68Z" fill="#FDE68A"/>
  </g>

  <!-- Wordmark -->
  <text
    x="430" y="115"
    text-anchor="middle"
    font-family="'Geist', 'Inter', -apple-system, sans-serif"
    font-weight="600"
    font-size="72"
    letter-spacing="-2"
    fill="#1F2937"
  >Acme</text>
</svg>
